---
apiVersion: v1
kind: Namespace
metadata:
  name: jupyter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyter-p5
  namespace: jupyter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jupyter-p5
  template:
    metadata:
      labels:
        app: jupyter-p5
    spec:
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      nodeSelector:
        eks.amazonaws.com/instance-family: "p5"
      containers:
      - name: jupyter
        image: 763104351884.dkr.ecr.us-west-2.amazonaws.com/huggingface-pytorch-training:2.5.1-transformers4.49.0-gpu-py311-cu124-ubuntu22.04
        command: ["/bin/bash", "-c"]
        args:
          - |
            pip install jupyterlab ipywidgets
            jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''
        ports:
        - containerPort: 8888
          name: jupyter
        resources:
          requests:
            nvidia.com/gpu: "1"
            cpu: "8"
            memory: "128Gi"
          limits:
            nvidia.com/gpu: "1"
            cpu: "16"
            memory: "256Gi"
        volumeMounts:
        - name: notebooks
          mountPath: /notebooks
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: notebooks
        persistentVolumeClaim:
          claimName: jupyter-notebooks
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 128Gi
---
apiVersion: v1
kind: Service
metadata:
  name: jupyter-service
  namespace: jupyter
spec:
  type: ClusterIP
  selector:
    app: jupyter-p5
  ports:
  - protocol: TCP
    port: 8888
    targetPort: 8888
